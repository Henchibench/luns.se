<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" style="background: transparent;">
  <!-- Background circle (optional, can be removed for full transparency) -->
  <circle cx="150" cy="60" r="55" fill="#2E5266" opacity="0.1"/>
  
  <!-- Main "LUNS" text -->
  <text x="150" y="45" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" 
        text-anchor="middle" fill="#2E5266" letter-spacing="2">LUNS</text>
  
  <!-- "MENU" text -->
  <text x="150" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="600" 
        text-anchor="middle" fill="#E67E22" letter-spacing="4">MENU</text>
  
  <!-- Food icons around the text -->
  <!-- Burger -->
  <g transform="translate(80, 35)">
    <circle cx="0" cy="0" r="8" fill="#D4AC0D"/>
    <circle cx="0" cy="0" r="6" fill="#F39C12"/>
    <rect x="-6" y="-2" width="12" height="2" fill="#E74C3C" opacity="0.8"/>
    <rect x="-5" y="1" width="10" height="1" fill="#58D68D" opacity="0.8"/>
  </g>
  
  <!-- Pizza slice -->
  <g transform="translate(220, 35)">
    <path d="M 0,0 L 8,8 A 8,8 0 0,0 8,-8 Z" fill="#F39C12"/>
    <circle cx="3" cy="2" r="1" fill="#E74C3C"/>
    <circle cx="5" cy="-3" r="1" fill="#27AE60"/>
  </g>
  
  <!-- Fries -->
  <g transform="translate(70, 75)">
    <rect x="0" y="0" width="2" height="8" fill="#F1C40F"/>
    <rect x="3" y="-1" width="2" height="9" fill="#F1C40F"/>
    <rect x="6" y="1" width="2" height="7" fill="#F1C40F"/>
    <rect x="0" y="8" width="8" height="3" fill="#E74C3C" opacity="0.8"/>
  </g>
  
  <!-- Donut -->
  <g transform="translate(230, 75)">
    <circle cx="0" cy="0" r="6" fill="#D4AC0D"/>
    <circle cx="0" cy="0" r="2.5" fill="transparent"/>
    <circle cx="-2" cy="-2" r="0.8" fill="#E91E63" opacity="0.8"/>
    <circle cx="2" cy="1" r="0.8" fill="#9C27B0" opacity="0.8"/>
  </g>
  
  <!-- Coffee cup -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="8" height="10" rx="1" fill="#8D6E63"/>
    <rect x="1" y="1" width="6" height="6" fill="#6F4E37"/>
    <ellipse cx="4" cy="7" rx="3" ry="0.5" fill="#3E2723" opacity="0.3"/>
    <rect x="8" y="3" width="2" height="4" rx="1" fill="#8D6E63"/>
  </g>
  
  <!-- Utensils -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="1" height="12" fill="#95A5A6"/>
    <rect x="-1" y="0" width="3" height="2" fill="#95A5A6"/>
    <rect x="4" y="0" width="1" height="12" fill="#95A5A6"/>
    <circle cx="4.5" cy="1" r="1.5" fill="#95A5A6"/>
  </g>
</svg> 