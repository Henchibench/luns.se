# Modern luns.se (Next.js + FastAPI)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name luns.se www.luns.se new.luns.se v2.luns.se;

    include /config/nginx/ssl.conf;

    # API routes
    location /api/ {
        include /config/nginx/proxy.conf;
        proxy_pass http://api-modern:8000/;
    }

    # Frontend (Next.js) - catch all other routes
    location / {
        include /config/nginx/proxy.conf;
        proxy_pass http://app-modern:3000;
    }
}

# HTTP redirect
server {
    listen 80;
    listen [::]:80;
    server_name luns.se www.luns.se;
    return 301 https://$server_name$request_uri;
}