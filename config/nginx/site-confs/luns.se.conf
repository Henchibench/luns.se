# Main site (legacy Flask app)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name luns.se www.luns.se;

    include /config/nginx/ssl.conf;

    location / {
        include /config/nginx/proxy.conf;
        proxy_pass http://app-legacy:8000;
    }
}

# New modern version
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name new.luns.se v2.luns.se;

    include /config/nginx/ssl.conf;

    # Frontend (Next.js)
    location / {
        include /config/nginx/proxy.conf;
        proxy_pass http://app-modern:3000;
    }

    # API routes
    location /api/ {
        include /config/nginx/proxy.conf;
        proxy_pass http://api-modern:8000/;
    }
}

# HTTP redirect
server {
    listen 80;
    listen [::]:80;
    server_name luns.se www.luns.se;
    return 301 https://$server_name$request_uri;
}