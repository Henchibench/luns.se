server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name luns.se;

    include /config/nginx/ssl.conf;

    location / {
        include /config/nginx/proxy.conf;
        proxy_pass http://app:8000;
    }
}

# HTTP redirect
server {
    listen 80;
    listen [::]:80;
    server_name luns.se;
    return 301 https://$server_name$request_uri;
} 