server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name contaboluns.luns.se;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;
        proxy_pass http://app:8000;  # Changed to match gunicorn port
    }
}

# HTTP redirect
server {
    listen 80;
    listen [::]:80;
    server_name contaboluns.luns.se;
    return 301 https://$server_name$request_uri;
}