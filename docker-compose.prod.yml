version: '3.8'

services:
  app-legacy:
    build: .
    container_name: luns-legacy-prod
    ports:
      - "5000:5000"
    networks:
      - luns-network

  app-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: luns-api-prod
    ports:
      - "8000:8000"
    networks:
      - luns-network

  app-modern:
    build:
      context: .
      dockerfile: Dockerfile.modern.prod
    container_name: luns-modern-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - luns-network

  redis:
    image: redis:alpine
    container_name: luns-redis-prod
    ports:
      - "6379:6379"
    networks:
      - luns-network

networks:
  luns-network:
    driver: bridge 