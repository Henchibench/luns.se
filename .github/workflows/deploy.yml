name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb

    - name: Setup SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ssh.luns.se >> ~/.ssh/known_hosts

    - name: Deploy
      env:
        CF_SERVICE_TOKEN: ${{ secrets.CLOUDFLARE_SERVICE_TOKEN }}
      run: |
        echo "$CF_SERVICE_TOKEN" | cloudflared access login ssh.luns.se
        ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@ssh.luns.se '
          cd /var/www/luns.se &&
          git pull &&
          docker-compose down &&
          docker-compose up --build -d
        '
