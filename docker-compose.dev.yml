version: '3.8'

services:
  # New modern app (Next.js frontend) - accessible at localhost:3000
  app-modern:
    build: 
      context: .
      dockerfile: Dockerfile.modern
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - API_URL=http://api-modern:8000
    container_name: luns-modern-dev
    ports:
      - "3000:3000"  # Map to localhost:3000
    depends_on:
      - api-modern
    networks:
      - app-network

  # Modern API backend - accessible at localhost:8000
  api-modern:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    container_name: luns-api-dev
    ports:
      - "8000:8000"  # Map to localhost:8000
    depends_on:
      - redis
    networks:
      - app-network

  # Redis for modern app caching - accessible at localhost:6379
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: luns-redis-dev
    ports:
      - "6379:6379"  # Map to localhost:6379 for debugging
    volumes:
      - redis_data_dev:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data_dev: 