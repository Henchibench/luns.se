version: '3.8'

services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - .:/app
    networks:
      - web_network
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
    restart: unless-stopped

  # If you need a database later:
  # db:
  #   image: postgres:13
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_DB=luns
  #     - POSTGRES_USER=luns
  #     - POSTGRES_PASSWORD=your_password

networks:
  web_network:
    external: true

volumes:
  postgres_data:
