services:
  # Modern Next.js frontend
  app-modern:
    build: 
      context: .
      dockerfile: Dockerfile.modern
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_URL=http://api-modern:8000
    container_name: luns-modern
    networks:
      - app-network

  # Modern FastAPI backend  
  api-modern:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    container_name: luns-api
    depends_on:
      - redis
    networks:
      - app-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: luns-redis
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # SWAG reverse proxy with SSL
  swag:
    image: lscr.io/linuxserver/swag
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
      - URL=luns.se
      - VALIDATION=dns
      - DNSPLUGIN=cloudflare
      - SUBDOMAINS=wildcard
      - EMAIL=henrik.soderstrom@outlook.com
    volumes:
      - ./config:/config
    ports:
      - "443:443"
      - "80:80"
    restart: unless-stopped
    depends_on:
      - app-modern
      - api-modern
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data: 